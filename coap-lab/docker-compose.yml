version: "3.9"

services:
  coap-server:
    build:
      context: ./server
    container_name: coap-server
    ports:
      - "5683:5683/udp"
    networks:
      coap-net:
        ipv4_address: 172.28.0.10

  coap-client:
    build:
      context: ./client
    container_name: coap-client
    depends_on:
      - coap-server
    environment:
      COAP_SERVER_HOST: 172.28.0.10
      COAP_SERVER_PORT: "5683"
    networks:
      - coap-net

networks:
  coap-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16